<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>BOFA Pong — Display</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/common.css" />
  <link rel="stylesheet" href="/css/display.css" />
</head>
<body>
  <button type="button" id="calibTrigger" class="calib-trigger" aria-label="Open projection calibration" title="Projection (P)"></button>

  <div id="projectionShell">
    <div id="gameViewport">
      <div id="stage">
        <canvas id="gameCanvas"></canvas>
      </div>

      <div class="vignette"></div>
      <div class="scanlines"></div>

      <div id="overlay">
        <section class="waiting" id="waitingScreen">
          <div>
            <h1 class="title">
              <span class="p1">P</span><span class="o">O</span><span class="p2">N</span><span class="o">G</span>
            </h1>
            <p class="subtitle">Scan the QR codes with each phone to control a paddle</p>
          </div>

          <div class="qr-row">
            <div class="qr-card left" id="qrCardLeft">
              <h2 class="qr-label">Left</h2>
              <div class="qr-img-wrap" id="qrWrapLeft">
                <img id="qrImgLeft" alt="QR code for left paddle" />
                <div class="connected-badge">READY</div>
              </div>
              <p class="qr-status" id="qrStatusLeft">Waiting for player</p>
            </div>
            <div class="qr-card right" id="qrCardRight">
              <h2 class="qr-label">Right</h2>
              <div class="qr-img-wrap" id="qrWrapRight">
                <img id="qrImgRight" alt="QR code for right paddle" />
                <div class="connected-badge">READY</div>
              </div>
              <p class="qr-status" id="qrStatusRight">Waiting for player</p>
            </div>
          </div>

          <p class="hint" id="hintText">First to 7 wins</p>
        </section>

        <div id="countdown" aria-hidden="true"></div>

        <section class="win-screen" id="winScreen" style="display:none">
          <p class="win-sub">Winner</p>
          <h1 class="win-title" id="winTitle">&nbsp;</h1>
          <p class="win-sub">New match starting soon...</p>
        </section>
      </div>
    </div>
  </div>

  <aside id="calibPanel" class="calib-panel hidden" role="dialog" aria-labelledby="calibTitle" aria-modal="false">
    <h2 id="calibTitle" class="calib-title">Projection fit</h2>
    <p class="calib-desc">Adjust while you see the game. Nothing is dimmed behind this panel.</p>

    <div class="calib-field">
      <label for="projWidth">Width <span id="projWidthVal" class="calib-val">100</span>%</label>
      <input type="range" id="projWidth" min="40" max="100" step="1" value="100" />
    </div>
    <div class="calib-field">
      <label for="projHeight">Height <span id="projHeightVal" class="calib-val">100</span>%</label>
      <input type="range" id="projHeight" min="40" max="100" step="1" value="100" />
    </div>
    <div class="calib-field">
      <label for="projPanX">Pan left / right <span id="projPanXVal" class="calib-val">0</span> vw</label>
      <input type="range" id="projPanX" min="-30" max="30" step="1" value="0" />
    </div>
    <div class="calib-field">
      <label for="projPanY">Pan up / down <span id="projPanYVal" class="calib-val">0</span> vh</label>
      <input type="range" id="projPanY" min="-30" max="30" step="1" value="0" />
    </div>

    <div class="calib-actions">
      <button type="button" id="calibReset" class="calib-btn secondary">Reset</button>
      <button type="button" id="calibClose" class="calib-btn">Close</button>
    </div>
    <p class="calib-hint"><kbd>P</kbd> toggle · <kbd>Esc</kbd> close</p>
  </aside>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/display.js"></script>
</body>
</html>
